# Local machine + device + Appium (copy to member*_local.yaml or my_local.yaml).
# Do not commit real Team IDs / UDIDs if your course or employer forbids it.

device:
  # Shown in Appium Inspector / Xcode; can be a friendly label.
  name: "Your iPhone Name"
  # Xcode → Window → Devices and Simulators → Identifier, or: xcrun devicectl list devices
  udid: "YOUR_DEVICE_UDID"
  # iPhone Settings → General → About → iOS Version (e.g. 18.2)
  platform_version: "18.0"

app:
  # Target app for this run (FoodZilla / SnapCalorie / Lose It! each have their own).
  bundle_id: "com.example.yourapp"

appium:
  # Must match where `appium` is listening (default below).
  server_url: "http://127.0.0.1:4723"

xcode:
  # developer.apple.com → Account → Membership details → Team ID (10 chars)
  org_id: "YOUR_TEAM_ID"
  # Common values: Apple Development | Apple Distribution
  signing_id: "Apple Development"

session:
  wda_local_port: null
  new_command_timeout: 120
